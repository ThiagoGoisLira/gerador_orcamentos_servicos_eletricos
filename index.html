<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Orçamentos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="layout-container">
        
        <header class="header">
            <h1 class="header__title" id="main-title">Novo Orçamento</h1>
            <a href="dashboard.php" class="button button--link">📊 Ver Painel</a>
        </header>

        <section class="card">
            <h2 class="card__title">Dados do Cliente</h2>
            <div class="form__group">
                <label class="form__label" for="cliente_nome">Nome do Cliente</label>
                <input type="text" id="cliente_nome" class="form__input" placeholder="Nome completo do cliente">
            </div>
            
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 15px;">
                <div class="form__group">
                    <label class="form__label" for="cliente_endereco">Endereço</label>
                    <input type="text" id="cliente_endereco" class="form__input" placeholder="Rua, Nº, Bairro, Cidade">
                </div>
                <div class="form__group">
                    <label class="form__label" for="cliente_telefone">Telefone / Contato</label>
                    <input type="tel" id="cliente_telefone" class="form__input" placeholder="(XX) XXXXX-XXXX">
                </div>
            </div>
            
            <div class="form__group">
                <label class="form__label" for="orcamento_data">Data do Orçamento</label>
                <input type="date" id="orcamento_data" class="form__input" style="width: 200px;">
            </div>
        </section>

        <section class="card">
            <h2 class="card__title">Serviços Principais</h2>
            
            <div class="service-block">
                <div class="service-block__main">
                    <input type="checkbox" id="serv_cameras" class="service-block__checkbox">
                    <label class="service-block__label" for="serv_cameras">Câmeras (Instalação/Manutenção)</label>
                    <input type="number" id="val_cameras" class="form__input service-block__price" placeholder="Valor (R$)">
                </div>
                <div class="service-block__details" id="detalhe_cameras" style="display: none;">
                    <textarea id="desc_cameras" class="form__textarea" rows="2" placeholder="Ex: Instalação de 4 câmeras HD..."></textarea>
                </div>
            </div>
            
            <div class="service-block">
                <div class="service-block__main">
                    <input type="checkbox" id="serv_cerca" class="service-block__checkbox">
                    <label class="service-block__label" for="serv_cerca">Cerca Elétrica</label>
                    <input type="number" id="val_cerca" class="form__input service-block__price" placeholder="Valor (R$)">
                </div>
                <div class="service-block__details" id="detalhe_cerca" style="display: none;">
                    <textarea id="desc_cerca" class="form__textarea" rows="2" placeholder="Ex: Instalação de 40m de cerca..."></textarea>
                </div>
            </div>

            <div class="service-block">
                <div class="service-block__main">
                    <input type="checkbox" id="serv_instalacao" class="service-block__checkbox">
                    <label class="service-block__label" for="serv_instalacao">Instalação Elétrica (Nova/Reforma)</label>
                    <input type="number" id="val_instalacao" class="form__input service-block__price" placeholder="Valor (R$)">
                </div>
                <div class="service-block__details" id="detalhe_instalacao" style="display: none;">
                    <textarea id="desc_instalacao" class="form__textarea" rows="2" placeholder="Ex: Substituição da fiação..."></textarea>
                </div>
            </div>

            <div class="service-block">
                <div class="service-block__main">
                    <input type="checkbox" id="serv_manutencao" class="service-block__checkbox">
                    <label class="service-block__label" for="serv_manutencao">Manutenção Elétrica Geral</label>
                    <input type="number" id="val_manutencao" class="form__input service-block__price" placeholder="Valor (R$)">
                </div>
                <div class="service-block__details" id="detalhe_manutencao" style="display: none;">
                    <textarea id="desc_manutencao" class="form__textarea" rows="2" placeholder="Ex: Reparação de curto-circuito..."></textarea>
                </div>
            </div>
        </section>

        <section class="card">
            <h2 class="card__title">Materiais e Peças Adicionais</h2>
            
            <div class="item-adder">
                <input type="text" id="item_desc" class="form__input item-adder__input--desc" placeholder="Descrição do item (ex: Disjuntor 20A)">
                <input type="number" id="item_valor" class="form__input item-adder__input--price" placeholder="Valor (R$)">
                <button type="button" class="button button--dark" id="btn-add-item">Adicionar</button>
            </div>
            
            <div class="table-wrapper">
                <table class="table">
                    <thead>
                        <tr>
                            <th class="table__header">Descrição do Material</th>
                            <th class="table__header" style="width: 130px;">Valor (R$)</th>
                            <th class="table__header table__cell--action">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="itens_lista"></tbody>
                </table>
            </div>
        </section>

        <section class="card">
            <h2 class="card__title">Fechamento do Orçamento</h2>
            
            <div class="form__group" style="width: 250px;">
                <label class="form__label" for="outros_valores">Custos Extras (Deslocamento, Taxas)</label>
                <input type="number" id="outros_valores" class="form__input" placeholder="0.00">
            </div>

            <div class="form__group">
                <label class="form__label" for="observacoes">Observações Gerais</label>
                <textarea id="observacoes" class="form__textarea" rows="3" placeholder="Prazos, formas de pagamento, garantia do serviço..."></textarea>
            </div>

            <div class="total-display">
                Total: <span class="total-display__value" id="total_orcamento">R$ 0,00</span>
            </div>
        </section>

        <footer class="footer">
            <div class="form__group" style="max-width: 300px;">
                <label class="form__label" for="status_orcamento">Status Inicial do Orçamento</label>
                <select id="status_orcamento" class="form__select">
                    <option value="Pendente" selected>Pendente</option>
                    <option value="Aprovado">Aprovado</option>
                    <option value="Recusado">Recusado</option>
                </select>
            </div>

            <div class="footer__actions">
                <button type="button" id="btn-save-db" class="button button--warning button--half" data-edit-id="">💾 Salvar no Sistema</button>
                <button type="button" id="btn-print" class="button button--success button--half">🖨️ Gerar PDF / Imprimir</button>
            </div>
        </footer>
        
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
